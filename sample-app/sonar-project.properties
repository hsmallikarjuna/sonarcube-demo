sonar.projectKey=sonar-demo-app
sonar.projectName=SonarQube CI/CD Demo App
sonar.projectVersion=1.0

# Source/test layout
sonar.sources=src
sonar.tests=test
sonar.exclusions=node_modules/**,coverage/**
sonar.test.inclusions=test/**/*.test.js

# Coverage report generated by `npm test` (nyc --reporter=lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
